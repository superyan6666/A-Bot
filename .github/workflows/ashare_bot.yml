name: Intraday Right-Side Trading Bot

on:
  schedule:
    # A股交易日期间，每隔 30 分钟运行一次
    - cron: '*/30 1-3,5-7 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式 (全量量化扫描 / 仅大盘体检播报 / 仅测试连通性)'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - market_only
          - test_conn
      push_empty:
        description: '是否在无信号时也推送大盘状态报告？'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # 强行熔断时间：5分钟。给 Python 内部 40s+90s 的优雅降级留下充分缓冲时间
    timeout-minutes: 5
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 搭建 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quant-v2
          restore-keys: |
            ${{ runner.os }}-pip-quant-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade akshare pandas numpy requests pytz

      - name: 启动监控引擎 / 测试连通性
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          PUSH_EMPTY_RESULT: ${{ inputs.push_empty || 'true' }} 
          RUN_MODE: ${{ inputs.run_mode || 'normal' }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ "$RUN_MODE" == "test_conn" ]; then
            echo "🔔 检测到测试模式，执行钉钉连通性推送..."
            python -c "
          import os, requests, datetime
          webhook = os.environ.get('DINGTALK_WEBHOOK')
          if not webhook:
              print('❌ 未配置 DINGTALK_WEBHOOK 环境变量')
              exit(1)
          now = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          msg = f'🤖 AI量化打板引擎 连通性测试成功！\n时间: {now}\n状态: GitHub Actions 触发器与网络链路完全畅通。'
          res = requests.post(webhook, json={'msgtype': 'text', 'text': {'content': msg}}, timeout=10)
          print('✅ 推送结果:', res.text)
          "
          elif [ "$RUN_MODE" == "market_only" ]; then
            echo "📊 检测到大盘体检模式，开始扫描宏观资金与情绪指标..."
            python main.py
          else
            echo "🚀 执行全量 A 股量化扫描..."
            python main.py
          fi

      - name: 保存运行状态
        if: ${{ inputs.run_mode != 'test_conn' && inputs.run_mode != 'market_only' }} 
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] 更新今日监控推送名单"
          file_pattern: 'pushed_state.json'
          commit_options: '--no-verify --signoff'
