name: Intraday Right-Side Trading Bot

on:
  schedule:
    # 交易日每隔 30 分钟运行一次 (GitHub 的 cron 最小精度是5分，但实际执行会有延迟，30分最稳定)
    # UTC 01,02,03 对应北京时间 09,10,11点
    # UTC 05,06,07 对应北京时间 13,14,15点
    # 结合 python 脚本内的严格时间控制，这样配置是最安全的
    - cron: '*/30 1-3,5-7 * * 1-5'
  workflow_dispatch: 

# 给赋予 action 写入仓库的权限 (用于保存去重缓存)
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          # 使用 PAT token 或者默认 token
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests pytz

      - name: 运行盘中量化监控
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python main.py

      - name: 自动保存推送记录 (去重记忆)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] 更新今日已推送信号缓存"
          file_pattern: 'pushed_state.json'
          # 这样提交记录不会触发下一次 action 无限循环
          commit_options: '--no-verify --signoff'
