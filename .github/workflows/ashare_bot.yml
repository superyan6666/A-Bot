name: Intraday Right-Side Trading Bot

on:
  schedule:
    # A股交易日期间，每隔 30 分钟运行一次
    - cron: '*/30 1-3,5-7 * * 1-5'
  workflow_dispatch:
    inputs:
      push_empty:
        description: '是否在无信号时也推送状态报告？'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # 【严谨性建议】：盘中监控对时间要求极高。
    # 设置 4 分钟强行熔断，既能保证信号不过时，也能最大化节省 GitHub 免费时长。
    timeout-minutes: 4
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 搭建 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 利用缓存跳过 pip 安装，减少运行时间 ~45 秒
      - name: 缓存 pip 依赖
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quant-v1

      - name: 安装依赖
        run: |
          pip install akshare pandas numpy requests pytz

      - name: 启动监控引擎
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          PUSH_EMPTY_RESULT: ${{ github.event.inputs.push_empty || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: python main.py

      - name: 保存运行状态
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] sync state"
          file_pattern: 'pushed_state.json'
