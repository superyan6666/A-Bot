name: Intraday Right-Side Trading Bot

on:
  schedule:
    # 提前至北京时间 14:45 触发 (尾盘买入法)，预留 Github Actions 队列排队延迟
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式 (全量量化扫描 / 仅大盘体检播报 / 仅测试连通性)'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - market_only
          - test_conn
      push_empty:
        description: '是否在无信号时也推送大盘状态报告？'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # 强行熔断时间：30分钟。给极端的网络波动和备用源优雅降级留下绝对充足的时间
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 搭建 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 缓存 pip 依赖与行情数据
        uses: actions/cache@v4
        with:
          # 【关键修复】：将历史K线目录和快照缓存一同纳入云端持久化，大幅提速并防封锁
          path: |
            ~/.cache/pip
            hist_cache/
            spot_cache.pkl
          key: ${{ runner.os }}-quant-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-quant-cache-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade akshare pandas numpy requests pytz baostock efinance tushare

      - name: 启动监控引擎 / 测试连通性
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          PUSH_EMPTY_RESULT: ${{ inputs.push_empty == false && 'false' || 'true' }} 
          RUN_MODE: ${{ inputs.run_mode || 'normal' }}
          PYTHONIOENCODING: "utf-8"
          PYTHONUNBUFFERED: "1"
        run: |
          if [ "$RUN_MODE" == "test_conn" ]; then
            echo "🔔 检测到测试模式，执行钉钉连通性推送..."
            # 【逻辑梳理】：采用安全的 Here-Doc 语法，避免 Bash 单双引号转义冲突引发崩溃
            python - << 'EOF'
          import os, requests, datetime
          webhook = os.environ.get('DINGTALK_WEBHOOK')
          if not webhook:
              print('❌ 未配置 DINGTALK_WEBHOOK 环境变量')
              exit(1)
          now = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          msg = f'🤖 AI量化打板引擎 连通性测试成功！\n时间: {now}\n状态: GitHub Actions 触发器与网络链路完全畅通。'
          res = requests.post(webhook, json={'msgtype': 'text', 'text': {'content': msg}}, timeout=10)
          print('✅ 推送结果:', res.text)
          EOF
          elif [ "$RUN_MODE" == "market_only" ]; then
            echo "📊 检测到大盘体检模式，开始扫描宏观资金与情绪指标..."
            python main.py
          else
            echo "🚀 执行全量 A 股量化扫描..."
            python main.py
          fi

      - name: 保存运行状态与模拟盘账本
        if: ${{ github.event_name == 'schedule' || inputs.run_mode == 'normal' }} 
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] 更新推送状态与AI模拟盘账本"
          # 【关键修复】：将新产生的 paper_trades.json 纳入自动提交，确保胜率能够跨日继承进化
          file_pattern: 'pushed_state.json paper_trades.json'
          commit_options: '--no-verify --signoff'
