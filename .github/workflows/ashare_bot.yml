name: Intraday Right-Side Trading Bot

on:
  schedule:
    # A股交易日期间，每隔 30 分钟运行一次进行盘中监控
    # UTC 01,02,03 分别对应北京时间 09,10,11点
    # UTC 05,06,07 分别对应北京时间 13,14,15点
    - cron: '*/30 1-3,5-7 * * 1-5'
  workflow_dispatch: # 允许手动点击运行（方便测试）

# 允许 Action 提交推过的记录，防止每天 30 分钟重复轰炸群聊
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 搭建 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 缓存pip包，加快以后每次执行的速度

      - name: 安装量化组件依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests pytz

      - name: 启动盘中量化狙击脚本
        env:
          # 此处必须与你在 GitHub Settings 里新建的 Secret 名字一致
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python main.py

      - name: 保存机器人记忆 (防止重复推送)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] 更新今日监控推送名单"
          file_pattern: 'pushed_state.json'
          commit_options: '--no-verify --signoff'
